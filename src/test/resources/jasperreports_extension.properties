#Font
net.sf.jasperreports.extension.registry.factory.simple.font.families=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
net.sf.jasperreports.extension.simple.font.families.customfonts=customfonts.xml
# Aliases the host font families the example reports request (Arial, SansSerif, Serif, ...) onto the
# bundled DejaVu TrueType fonts so the example baseline images render reproducibly across platforms.
net.sf.jasperreports.extension.simple.font.families.baselinealiases=ch/unibas/medizin/dynamicreports/examples/baseline/fonts.xml
#GenericElement
net.sf.jasperreports.extension.registry.factory.genericelementexporters=net.sf.jasperreports.spring.SpringExtensionsRegistryFactory
net.sf.jasperreports.extension.genericelementexporters.spring.beans.resource=generic_element_exporters.xml
